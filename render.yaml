# Render Blueprint for ExcelfromPDF Backend
# This file allows automatic deployment to Render

services:
  - type: web
    name: excelfrom-pdf-backend
    env: python
    region: oregon # Change to your preferred region
    plan: free # or 'starter' for $7/month
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: RAZORPAY_KEY_ID
        sync: false # Add manually in Render Dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false # Add manually in Render Dashboard
    autoDeploy: true

    # Disk for file storage (optional, but recommended)
    disk:
      name: storage
      mountPath: /opt/render/project/src/backend/storage
      sizeGB: 1
